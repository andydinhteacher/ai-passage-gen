<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passage Lab AI - Professional Teacher Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel to transpile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* Slate 50 */
            color: #0f172a; /* Slate 900 */
        }
        .white-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0; /* Slate 200 */
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .selection-teal::selection {
            background-color: rgba(20, 184, 166, 0.2);
            color: #0d9488;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- CONSTANTS ---
        const MODEL_NAME = "gemini-2.5-flash"; 
        const CEFR_LEVELS = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
        const PASSAGE_FORMATS = ['General Passage', 'Informal Email', 'Formal Email', 'Public Notice', 'Advertisement', 'Short News Article', 'Memo', 'Text Message Chain', 'Blog Post', 'Product Review'];
        const COMMON_TOPICS = ['Technology', 'Environment', 'Health', 'Education', 'Travel', 'Culture', 'History', 'Business'];
        const GRADE_DATA = {
            '6': { label: 'Grade 6', topics: ['My New School', 'My Home', 'My Friends', 'Favorite Holidays', 'A Day in My Life', 'School Clubs', 'My Pet'], wordCount: '80-100', skills: 'Describing places, people, and routines.' },
            '7': { label: 'Grade 7', topics: ['My Hobbies', 'Health & Fitness', 'Community Service', 'School Life Around the World', 'Favorite Foods', 'Planning a Weekend Trip'], wordCount: '100-120', skills: 'Expressing opinions, discussing problems.' },
            '8': { label: 'Grade 8', topics: ['Leisure Activities', 'City Life vs. Country Life', 'Review of a New Movie', 'A School Event', 'Global Customs and Traditions', 'A Pen Pal'], wordCount: '120-150', skills: 'Comparing lifestyles, describing traditions.' },
            '9': { label: 'Grade 9', topics: ['Local Environment Issues', 'Future Cities', 'Teen Stress and Pressure', 'Natural Wonders of the World', 'A Part-time Job', 'Planning a Group Project'], wordCount: '150-180', skills: 'Discussing environmental issues, handling social pressures.' },
            '10': { label: 'Grade 10', topics: ['The Impact of AI', 'Globalization', 'Lifelong Learning', 'The Changing World of Work', 'The Influence of Social Media', 'Requesting Information'], wordCount: '180-200', skills: 'Developing arguments, understanding complex texts.' },
            '11': { label: 'Grade 11', topics: ['Genetic Engineering', 'Space Exploration', 'Preserving Cultural Heritage', 'Global Social Issues', 'Solving Environmental Challenges', 'Making a Formal Complaint'], wordCount: '200-220', skills: 'Analyzing different viewpoints, synthesizing information.' },
            '12': { label: 'Grade 12', topics: ['Career Orientation Advice', 'Comparing Higher Education Systems', 'Protecting the Environment for the Future', 'Technological Advancements and Society', 'Preparing for Independent Life', 'A University Application Inquiry'], wordCount: '220-250', skills: 'Critical thinking, evaluating sources, formal writing.' },
        };

        // --- ICONS ---
        const SpinnerIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );
        const SparklesIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m11-13v4m-2-2h4m2 11h-4m2 2v-4M12 2v2m-2 18v2M7.7 7.7l1.4-1.4M17.7 7.7l-1.4-1.4M7.7 16.3l1.4 1.4M17.7 16.3l-1.4 1.4" />
            </svg>
        );
        const ClipboardIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        );
        const CheckCircleIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );
        const DiceIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 4h16v16H4V4zM8 8h.01M16 8h.01M12 12h.01M8 16h.01M16 16h.01" />
            </svg>
        );

        // --- UI COMPONENTS ---
        const Button = ({ onClick, disabled, children, variant = "primary" }) => (
            <button
                onClick={onClick}
                disabled={disabled}
                className={`w-full flex items-center justify-center gap-3 px-6 py-4 text-base font-bold text-center text-white rounded-2xl transition-all focus:ring-4 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 ${
                    variant === "primary" 
                    ? "bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-600 hover:to-cyan-700 focus:ring-teal-500/50 shadow-lg shadow-teal-500/20" 
                    : "bg-slate-200 text-slate-700 hover:bg-slate-300 focus:ring-slate-400/50"
                }`}
            >
                {children}
            </button>
        );

        const Select = ({ label, id, value, onChange, children }) => (
            <div>
                <label htmlFor={id} className="block mb-2 text-sm font-bold text-slate-500 uppercase tracking-widest">{label}</label>
                <select id={id} value={value} onChange={onChange} className="bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-teal-500 focus:border-teal-500 block w-full p-3.5 outline-none transition-colors cursor-pointer appearance-none">
                    {children}
                </select>
            </div>
        );

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- MAIN APP ---
        const App = () => {
            const [apiKeyInput, setApiKeyInput] = useState('');
            const [apiStatus, setApiStatus] = useState('idle'); 
            const [mode, setMode] = useState('cefr');
            const [cefrLevel, setCefrLevel] = useState(CEFR_LEVELS[1]);
            const [cefrFormat, setCefrFormat] = useState(PASSAGE_FORMATS[0]);
            const [commonTopic, setCommonTopic] = useState(COMMON_TOPICS[0]);
            const [customTopic, setCustomTopic] = useState('');
            const [wordCount, setWordCount] = useState(150);
            const [grade, setGrade] = useState('6');
            const [gradeTopic, setGradeTopic] = useState(GRADE_DATA['6'].topics[0]);
            const [gradeFormat, setGradeFormat] = useState(PASSAGE_FORMATS[0]);
            const [passage, setPassage] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [numMcqs, setNumMcqs] = useState(3);
            const [mcqData, setMcqData] = useState(null);
            const [isGeneratingMcqs, setIsGeneratingMcqs] = useState(false);
            const [copied, setCopied] = useState(false);
            const [showAnswers, setShowAnswers] = useState(false);

            const handleCopy = (text) => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) { console.error(err); }
                document.body.removeChild(textarea);
            };

            const callGemini = async (prompt, isJson = false, providedKey = null) => {
                const apiKey = providedKey !== null ? providedKey : (apiKeyInput || "");
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: isJson ? { responseMimeType: "application/json" } : {}
                };

                let lastError = null;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || "Gemini API error occurred");

                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        lastError = err;
                        if (i < 4) await sleep(Math.pow(2, i) * 1000);
                    }
                }
                throw lastError;
            };

            const verifyKey = async () => {
                if (!apiKeyInput) return;
                setApiStatus('checking');
                setError('');
                try {
                    await callGemini("Say 'valid'", false, apiKeyInput);
                    setApiStatus('valid');
                } catch (err) {
                    setApiStatus('error');
                    setError(err.message);
                }
            };

            const randomizeOptions = () => {
                const randomFormat = PASSAGE_FORMATS[Math.floor(Math.random() * PASSAGE_FORMATS.length)];
                if (mode === 'cefr') {
                    const randomTopic = COMMON_TOPICS[Math.floor(Math.random() * COMMON_TOPICS.length)];
                    setCefrFormat(randomFormat);
                    setCommonTopic(randomTopic);
                } else {
                    const currentGradeTopics = GRADE_DATA[grade].topics;
                    const randomTopic = currentGradeTopics[Math.floor(Math.random() * currentGradeTopics.length)];
                    setGradeFormat(randomFormat);
                    setGradeTopic(randomTopic);
                }
            };

            const generatePassage = async () => {
                setIsLoading(true);
                setError('');
                setPassage('');
                setMcqData(null);
                
                const topic = mode === 'cefr' 
                    ? (commonTopic === 'Custom' ? customTopic : commonTopic) 
                    : gradeTopic;
                const format = mode === 'cefr' ? cefrFormat : gradeFormat;
                const levelDesc = mode === 'cefr' ? `CEFR ${cefrLevel}` : `Grade ${grade}`;
                const wc = mode === 'cefr' ? wordCount : GRADE_DATA[grade].wordCount;

                const prompt = `Act as an expert ESL curriculum developer for secondary and high school students.
                Generate a reading passage in the format of a ${format}.
                Topic: ${topic}
                Level: ${levelDesc}
                Approximate Length: ${wc} words.
                
                Rules:
                - Use vocabulary and grammar appropriate for ${levelDesc}.
                - Do NOT include a title.
                - Use simplified dates (e.g., 'May 12'), no years.
                - Output only the passage text.`;

                try {
                    const result = await callGemini(prompt);
                    setPassage(result);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const generateMcqs = async () => {
                setIsGeneratingMcqs(true);
                setShowAnswers(false);
                const prompt = `Based on the passage provided, create ${numMcqs} multiple-choice comprehension questions.
                
                Passage: "${passage}"
                
                Rules for Questions:
                - Exactly 4 options per question.
                - Use uppercase labels: A, B, C, D.
                - Distractors must be plausible.
                - Format output as JSON only.

                JSON Structure:
                {
                  "questions": [
                    {
                      "question": "Question text?",
                      "options": ["Option A text", "Option B text", "Option C text", "Option D text"],
                      "answer": "Exact correct option text"
                    }
                  ]
                }`;

                try {
                    const resultText = await callGemini(prompt, true);
                    setMcqData(JSON.parse(resultText));
                } catch (err) {
                    setError("Failed to generate assessment. Please check your key.");
                } finally {
                    setIsGeneratingMcqs(false);
                }
            };

            const copyAll = () => {
                if (!mcqData) return;
                let text = `[READING MATERIAL]\n\n${passage}\n\n[ASSESSMENT]\n\n`;
                mcqData.questions.forEach((q, i) => {
                    text += `${i + 1}. ${q.question}\n`;
                    q.options.forEach((opt, oi) => {
                        text += `${String.fromCharCode(65 + oi)}. ${opt}\n`;
                    });
                    text += `\n`;
                });
                text += `[ANSWER KEY]\n\n`;
                mcqData.questions.forEach((q, i) => {
                    const letter = String.fromCharCode(65 + q.options.indexOf(q.answer));
                    text += `${i + 1}. ${letter}\n`;
                });
                handleCopy(text);
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8 md:py-16 selection-teal">
                    <header className="text-center mb-12 md:mb-20">
                        <div className="inline-block px-6 py-2 rounded-full bg-teal-500/10 border border-teal-500/20 text-teal-600 text-sm font-bold uppercase tracking-widest mb-6">
                            Professional ESL Companion
                        </div>
                        <h1 className="text-5xl md:text-7xl font-extrabold text-slate-900 mb-6 tracking-tight">
                            Passage Lab AI
                        </h1>
                        <div className="flex items-center justify-center gap-8 text-xs md:text-sm font-mono text-slate-400 uppercase tracking-[0.3em]">
                            <span>Mr. Anh Đinh</span>
                            <span className="h-2 w-2 bg-slate-200 rounded-full"></span>
                            <span>TOEIC 955</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                        {/* LEFT: SETTINGS */}
                        <aside className="lg:col-span-4 space-y-8">
                            
                            {/* HƯỚNG DẪN SỬ DỤNG (TIẾNG VIỆT) */}
                            <div className="white-panel rounded-[2.5rem] p-8 md:p-10 border-teal-50">
                                <h3 className="text-slate-900 font-extrabold text-lg mb-6 flex items-center gap-3">
                                    <span className="p-2 bg-teal-100 text-teal-600 rounded-2xl text-xl">🎓</span>
                                    Hướng dẫn sử dụng
                                </h3>
                                <div className="space-y-5 text-sm md:text-base text-slate-600 leading-relaxed">
                                    <div className="flex gap-4">
                                        <span className="text-teal-500 font-black">01.</span>
                                        <p><strong className="text-slate-800">Khóa API:</strong> Lấy khóa tại <a href="https://aistudio.google.com/" target="_blank" className="text-teal-600 underline">AI Studio</a>. Dán vào và nhấn <span className="text-slate-800 italic font-semibold">Verify</span>.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <span className="text-teal-500 font-black">02.</span>
                                        <p><strong className="text-slate-800">Randomize:</strong> Nhấn biểu tượng 🎲 để hệ thống tự chọn Topic và Format ngẫu nhiên cho bạn.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <span className="text-teal-500 font-black">03.</span>
                                        <p><strong className="text-slate-800">Soạn thảo:</strong> <span className="text-slate-800">CEFR</span> (Trình độ quốc tế) hoặc <span className="text-slate-800">Grade Level</span> (Khối lớp VN).</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <span className="text-teal-500 font-black">04.</span>
                                        <p><strong className="text-slate-800">Xuất bản:</strong> Dùng <span className="text-slate-800">Copy Pack</span> để dán vào Word/PPT trọn bộ câu hỏi và đáp án.</p>
                                    </div>
                                </div>
                                <div className="mt-8 pt-8 border-t border-slate-100">
                                    <p className="text-xs text-slate-400 font-mono italic font-semibold">ENGINE: {MODEL_NAME}</p>
                                </div>
                            </div>

                            <div className="white-panel rounded-[2.5rem] p-8 md:p-10 relative overflow-hidden">
                                {/* API Key Section */}
                                <div className="mb-10">
                                    <label className="block mb-3 text-xs font-bold text-slate-400 uppercase tracking-widest">Gemini API Key</label>
                                    <div className="flex gap-3">
                                        <input 
                                            type="password" 
                                            placeholder="Paste Key..."
                                            className="flex-grow bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-slate-800 text-base focus:ring-2 focus:ring-teal-500 outline-none transition-all"
                                            value={apiKeyInput}
                                            onChange={(e) => {setApiKeyInput(e.target.value); setApiStatus('idle');}}
                                        />
                                        <button 
                                            onClick={verifyKey}
                                            disabled={!apiKeyInput || apiStatus === 'checking'}
                                            className={`px-5 rounded-2xl text-sm font-bold transition-all shadow-sm ${
                                                apiStatus === 'valid' ? 'bg-green-100 text-green-600 border border-green-200' :
                                                apiStatus === 'error' ? 'bg-red-100 text-red-600 border border-red-200' :
                                                'bg-slate-800 hover:bg-slate-700 text-white'
                                            }`}
                                        >
                                            {apiStatus === 'checking' ? <SpinnerIcon className="w-5 h-5 animate-spin" /> : 
                                             apiStatus === 'valid' ? 'Done' : 
                                             apiStatus === 'error' ? 'Retry' : 'Verify'}
                                        </button>
                                    </div>
                                </div>

                                <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-10 border border-slate-200/50">
                                    <button onClick={() => setMode('cefr')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${mode === 'cefr' ? 'bg-white text-teal-600 shadow-md' : 'text-slate-500 hover:text-slate-800'}`}>CEFR Proficiency</button>
                                    <button onClick={() => setMode('grade')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${mode === 'grade' ? 'bg-white text-teal-600 shadow-md' : 'text-slate-500 hover:text-slate-800'}`}>Grade Level (VN)</button>
                                </div>

                                <div className="space-y-6">
                                    {mode === 'cefr' ? (
                                        <>
                                            <Select label="Target Proficiency" value={cefrLevel} onChange={e => setCefrLevel(e.target.value)}>
                                                {CEFR_LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                                            </Select>
                                            <Select label="Passage Format" value={cefrFormat} onChange={e => setCefrFormat(e.target.value)}>
                                                {PASSAGE_FORMATS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </Select>
                                            <Select label="Lesson Topic" value={commonTopic} onChange={e => setCommonTopic(e.target.value)}>
                                                {COMMON_TOPICS.map(t => <option key={t} value={t}>{t}</option>)}
                                                <option value="Custom">Custom Topic...</option>
                                            </Select>
                                            {commonTopic === 'Custom' && (
                                                <input type="text" placeholder="e.g., Global Warming" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-800 text-base focus:ring-2 focus:ring-teal-500 outline-none transition-all" value={customTopic} onChange={e => setCustomTopic(e.target.value)} />
                                            )}
                                        </>
                                    ) : (
                                        <>
                                            <Select label="School Grade" value={grade} onChange={e => setGrade(e.target.value)}>
                                                {Object.keys(GRADE_DATA).map(g => <option key={g} value={g}>{GRADE_DATA[g].label}</option>)}
                                            </Select>
                                            <Select label="Passage Format" value={gradeFormat} onChange={e => setGradeFormat(e.target.value)}>
                                                {PASSAGE_FORMATS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </Select>
                                            <Select label="Curriculum Topic" value={gradeTopic} onChange={e => setGradeTopic(e.target.value)}>
                                                {GRADE_DATA[grade].topics.map(t => <option key={t} value={t}>{t}</option>)}
                                            </Select>
                                        </>
                                    )}

                                    <div className="flex gap-3">
                                        <button 
                                            onClick={randomizeOptions} 
                                            title="Randomize Topic & Format"
                                            className="px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl transition-all active:scale-95 shadow-sm flex items-center justify-center border border-slate-200"
                                        >
                                            <DiceIcon className="w-7 h-7" />
                                        </button>
                                        <Button onClick={generatePassage} disabled={isLoading || (apiKeyInput && apiStatus !== 'valid')}>
                                            {isLoading ? <SpinnerIcon className="w-6 h-6 animate-spin" /> : <SparklesIcon className="w-6 h-6" />}
                                            {isLoading ? "Drafting..." : "Generate Content"}
                                        </Button>
                                    </div>
                                    
                                    {mode === 'cefr' ? (
                                        <div>
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">Word Count Limit</label>
                                                <span className="text-teal-600 font-mono font-black text-base">{wordCount} words</span>
                                            </div>
                                            <input type="range" min="50" max="500" step="10" className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-teal-500" value={wordCount} onChange={e => setWordCount(e.target.value)} />
                                        </div>
                                    ) : (
                                        <div className="p-5 bg-teal-50/50 rounded-[1.5rem] border border-teal-100">
                                            <p className="text-xs text-teal-500 uppercase font-black mb-2 tracking-tighter">Learning Goal</p>
                                            <p className="text-sm md:text-base text-slate-600 font-semibold leading-relaxed italic">"{GRADE_DATA[grade].skills}"</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </aside>

                        {/* RIGHT: OUTPUT */}
                        <div className="lg:col-span-8 space-y-10">
                            {/* PASSAGE */}
                            <section className="white-panel rounded-[3rem] min-h-[600px] flex flex-col shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 to-cyan-500 opacity-80"></div>
                                <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Reading Material</h2>
                                    {passage && (
                                        <button onClick={() => handleCopy(passage)} className="p-3.5 rounded-2xl bg-white text-slate-400 hover:text-teal-600 transition-all active:scale-90 border border-slate-200 hover:border-teal-200 shadow-sm">
                                            {copied ? <CheckCircleIcon className="w-6 h-6 text-green-500" /> : <ClipboardIcon className="w-6 h-6" />}
                                        </button>
                                    )}
                                </div>
                                <div className="p-10 md:p-16 flex-grow">
                                    {!passage && !isLoading ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-200 space-y-8">
                                            <div className="w-24 h-24 rounded-[2rem] bg-slate-50 flex items-center justify-center border border-slate-100">
                                                <SparklesIcon className="w-12 h-12 opacity-10" />
                                            </div>
                                            <p className="text-center font-bold text-lg text-slate-300 max-w-[320px]">Your professional ESL content will appear here after generation.</p>
                                        </div>
                                    ) : isLoading ? (
                                        <div className="h-full flex flex-col items-center justify-center space-y-8">
                                            <div className="relative">
                                                <SpinnerIcon className="w-20 h-20 text-teal-500 animate-spin" />
                                                <div className="absolute inset-0 flex items-center justify-center">
                                                    <div className="w-3.5 h-3.5 bg-teal-500 rounded-full animate-ping"></div>
                                                </div>
                                            </div>
                                            <p className="text-teal-600 font-black uppercase text-sm tracking-[0.4em] animate-pulse">Drafting Lesson Material...</p>
                                        </div>
                                    ) : (
                                        <div className="text-slate-800 leading-[1.9] text-xl font-serif whitespace-pre-wrap selection:bg-teal-50">
                                            {passage}
                                        </div>
                                    )}
                                </div>
                            </section>

                            {/* ASSESSMENT */}
                            {passage && (
                                <section className="white-panel rounded-[3rem] p-10 md:p-14 shadow-2xl space-y-12 border-t-[6px] border-teal-500">
                                    <div className="flex flex-col sm:flex-row gap-8 items-end">
                                        <div className="flex-grow">
                                            <label className="block mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Question Count</label>
                                            <div className="flex items-center gap-8 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                                                <input type="range" min="1" max="10" className="flex-grow h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-teal-500" value={numMcqs} onChange={e => setNumMcqs(e.target.value)} />
                                                <span className="text-teal-600 font-black text-3xl w-10 font-mono">{numMcqs}</span>
                                            </div>
                                        </div>
                                        <div className="w-full sm:w-[280px]">
                                            <Button variant="primary" onClick={generateMcqs} disabled={isGeneratingMcqs}>
                                                {isGeneratingMcqs ? <SpinnerIcon className="w-6 h-6 animate-spin" /> : <SparklesIcon className="w-6 h-6" />}
                                                Build Assessment
                                            </Button>
                                        </div>
                                    </div>

                                    {isGeneratingMcqs ? (
                                        <div className="py-24 flex flex-col items-center gap-8">
                                            <SpinnerIcon className="w-16 h-16 text-teal-500 animate-spin" />
                                            <p className="text-slate-400 font-black uppercase tracking-[0.3em] text-sm text-center">Developing Quiz Questions...</p>
                                        </div>
                                    ) : mcqData && (
                                        <div className="space-y-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                            <div className="flex justify-between items-center border-b border-slate-100 pb-8">
                                                <h3 className="text-2xl font-black text-slate-900 tracking-tight uppercase tracking-wider">Lesson Assessment</h3>
                                                <div className="flex gap-4">
                                                    <button onClick={() => setShowAnswers(!showAnswers)} className="px-6 py-3 rounded-2xl text-xs font-black bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all uppercase tracking-widest shadow-sm">
                                                        {showAnswers ? "Hide Keys" : "Show Keys"}
                                                    </button>
                                                    <button onClick={copyAll} className="px-6 py-3 rounded-2xl text-xs font-black bg-teal-100 text-teal-700 hover:bg-teal-200 transition-all uppercase tracking-widest flex items-center gap-2 shadow-sm">
                                                        <ClipboardIcon className="w-4 h-4" /> Copy Pack
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="space-y-12">
                                                {mcqData.questions.map((q, qIndex) => (
                                                    <div key={qIndex} className="space-y-8">
                                                        <div className="flex gap-6">
                                                            <span className="flex-shrink-0 w-10 h-10 rounded-[1.2rem] bg-teal-50 text-teal-600 flex items-center justify-center font-black text-base border border-teal-100 shadow-sm">{qIndex + 1}</span>
                                                            <p className="font-extrabold text-slate-800 text-xl leading-snug">{q.question}</p>
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 ml-16">
                                                            {q.options.map((opt, oIndex) => {
                                                                const letter = String.fromCharCode(65 + oIndex);
                                                                const isCorrect = opt === q.answer;
                                                                return (
                                                                    <div 
                                                                        key={oIndex} 
                                                                        className={`group p-6 rounded-[2rem] text-base transition-all border relative overflow-hidden ${
                                                                            showAnswers && isCorrect 
                                                                            ? "bg-green-50 border-green-500 text-green-700 shadow-lg font-bold" 
                                                                            : "bg-white border-slate-100 hover:border-teal-200 text-slate-600 shadow-sm hover:shadow-md"
                                                                        }`}
                                                                    >
                                                                        <div className="flex items-center gap-5">
                                                                            <span className={`w-9 h-9 rounded-xl flex items-center justify-center text-xs font-black flex-shrink-0 ${showAnswers && isCorrect ? 'bg-green-500 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>{letter}</span>
                                                                            <span className="flex-grow">{opt}</span>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </section>
                            )}
                        </div>
                    </div>
                    
                    <footer className="mt-24 text-center text-slate-400 text-xs font-medium uppercase tracking-[0.5em] pb-16">
                        &copy; 2026 Passage Lab AI • educator tool by anh đinh • designed for higher readability
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
